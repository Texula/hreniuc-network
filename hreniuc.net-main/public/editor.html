<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <link rel="stylesheet" href="/css/editor.css">
</head>
<body>
    <!-- Background Canvas -->
    <div id="vanta-bg"></div>

    <div class="editor-container">
        
        <!-- Top Profile Card -->
        <div class="profile-header">
            <div class="avatar-bubble">
                <img id="user-avatar" src="" class="user-img" onerror="this.style.display='none'">
            </div>
            <div class="user-info">
                <div class="user-name" id="user-name">Loading...</div>
                <div class="user-handle" id="user-handle">@...</div>
            </div>
        </div>

        <!-- Main Meta Block -->
        <div class="meta-block">
            <input type="text" id="post-title" class="title-input" placeholder="New Post Title" autocomplete="off">
            <textarea id="post-summary" class="summary-input" placeholder="Description or summary..." rows="2"></textarea>
            
            <div style="display: flex; gap: 15px; align-items: center; margin-top: 10px; flex-wrap: wrap;">
                <!-- Post Type System -->
                <div class="type-wrapper" style="margin: 0;">
                    <button class="choose-type-btn" onclick="togglePostTypeMenu()">
                        <span id="choose-type-btn-text">Choose Post Type</span>
                    </button>
                    <div id="active-post-type"></div>
                    
                    <div id="post-type-menu" class="type-menu">
                        <button class="type-option" onclick="selectPostType('Blog')">Blog</button>
                        <button class="type-option" onclick="selectPostType('Writeup')">Writeup</button>
                        <button class="type-option" onclick="selectPostType('Photo')">Photo</button>
                        <button class="type-option" onclick="selectPostType('Project')">Project</button>
                    </div>
                </div>

                <!-- NEW: Visibility Toggle -->
                <div class="toggle-container" style="margin: 0; padding: 6px 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; gap: 10px;">
                    <span class="toggle-label" style="font-size: 0.85em; color: #ccc;">Public Post</span>
                    <label class="switch" style="transform: scale(0.85); transform-origin: center right; margin: 0;">
                        <input type="checkbox" id="post-visibility" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Content Blocks -->
        <div id="blocks-container"></div>

        <!-- Add Button Hub -->
        <div class="add-block-wrapper">
            <div id="add-options" class="add-options">
                <button onclick="addBlock('text')">Text</button>
                <button onclick="addBlock('image')">Image</button>
                <button onclick="addBlock('gallery')">Gallery</button>
                <button onclick="addBlock('code')">Code</button>
                <button onclick="addBlock('chapter')">Subtitle</button>
            </div>
            <button id="add-btn" class="add-main-btn" onclick="toggleAddMenu()">+ Add Block</button>
        </div>

        <!-- Footer Actions -->
        <div class="bottom-actions">
            <button class="cancel-btn" onclick="window.location.href='/'">Cancel</button>
            <button id="publish-btn" class="publish-btn" onclick="publishPost()">Publish Post</button>
        </div>

    </div>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script src="/js/editor.js"></script>
</body>
</html>
