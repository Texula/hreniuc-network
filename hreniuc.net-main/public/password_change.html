<!DOCTYPE html>
<html lang="en" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - hreniuc.net</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body style="background-color: #000;">

    <div id="vanta-bg"></div>
    <div class="cursor-light"></div>

    <div class="glass-container">
        <div class="auth-box login-skin">
            <h2>Password Reset</h2>
            
            <form id="changePasswordForm">
                <p class="verify-text">Code verified! Enter your new password below.</p>
                <input type="password" id="newPassword" placeholder="New Password" required autocomplete="off">
                <input type="password" id="repeatPassword" placeholder="Repeat Password" required>
                <button type="submit">Update Password</button>
            </form>
            
            <div class="links">
                <p><a href="/login">Cancel</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

    <script>
        try {
            VANTA.FOG({
                el: "#vanta-bg",
                mouseControls: true, touchControls: true, gyroControls: false,
                minHeight: 200.00, minWidth: 200.00,
                highlightColor: 0x5e2a84, midtoneColor: 0x1a1a1a, lowlightColor: 0x000000, baseColor: 0x000000,
                blurFactor: 0.90, speed: 1.2, zoom: 1.2
            });
        } catch(e) {}

        const cursorLight = document.querySelector('.cursor-light');
        document.addEventListener('mousemove', (e) => {
            cursorLight.style.left = e.clientX + 'px';
            cursorLight.style.top = e.clientY + 'px';
        });

        // 1. Check Authorization via URL Params OR LocalStorage
        const urlParams = new URLSearchParams(window.location.search);
        let authEmail = urlParams.get('email') || localStorage.getItem('reset_email');
        let authCode = urlParams.get('code') || localStorage.getItem('reset_code');

        if (!authEmail || !authCode) {
            alert("Unauthorized access. Please request a new code.");
            window.location.href = "/forgor";
        }

        const ws = new WebSocket("wss://" + window.location.hostname + "/chatws");

        ws.onmessage = (evt) => {
            const data = JSON.parse(evt.data);
            
            if (data.type === "password_changed_success") {
                // Clear the sensitive data
                localStorage.removeItem('reset_email');
                localStorage.removeItem('reset_code');
                
                alert("Password successfully updated! You can now log in.");
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = "/login";
                }, 500);
            } 
            else if (data.type === "error") {
                alert(data.msg);
                document.querySelector('#changePasswordForm button[type="submit"]').disabled = false;
                document.querySelector('#changePasswordForm button[type="submit"]').innerText = "Update Password";
                
                if(data.msg.includes("Unauthorized") || data.msg.includes("expired")) {
                    localStorage.removeItem('reset_email');
                    localStorage.removeItem('reset_code');
                    window.location.href = "/forgor";
                }
            }
        };

        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const p1 = document.getElementById("newPassword").value;
            const p2 = document.getElementById("repeatPassword").value;

            if (p1 !== p2) {
                alert("Passwords do not match!");
                return;
            }

            if (p1.length < 3) {
                alert("Password is too short.");
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = "Updating...";

            if(ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ 
                    type: "change_password", 
                    email: authEmail, 
                    code: authCode, 
                    newPassword: p1 
                }));
            } else {
                alert("Connection not ready. Please refresh.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Password";
            }
        });
    </script>
</body>
</html>
