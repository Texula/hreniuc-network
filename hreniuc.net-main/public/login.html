<!DOCTYPE html>
<html lang="en" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - hreniuc.net</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body style="background-color: #000;">

    <!-- Background Layer -->
    <div id="vanta-bg"></div>
    
    <!-- Cursor Spotlight -->
    <div class="cursor-light"></div>

    <div class="glass-container">
        <!-- Default auth-box (Coarse Noise) for Login now -->
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <input type="text" id="usernameInput" placeholder="Username" required autocomplete="off">
                <input type="password" id="passwordInput" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
            <div class="links">
                <p>New here? <a id="linkToRegister" href="/register">Create an Account</a></p>
                <p>Forgot your password? <a href="/forgor">Reset it here</a></p>
            </div>
        </div>
    </div>

    <!-- Vanta JS Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

    <script>
        // 1. Initialize Visual Effects (Vanta JS)
        // Login now gets the Dark Purple theme
        try {
            VANTA.FOG({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                highlightColor: 0x5e2a84, /* Darker Deep Purple for Login */
                midtoneColor: 0x1a1a1a,   
                lowlightColor: 0x000000,  
                baseColor: 0x000000,
                blurFactor: 0.90,
                speed: 1.2,
                zoom: 1.2
            });
        } catch(e) { console.warn("Vanta JS failed to load", e); }

        // 2. Parallax Effect & Cursor Light
        const cursorLight = document.querySelector('.cursor-light');
        const vantaBg = document.getElementById('vanta-bg');
        let parallaxEnabled = true;

        document.addEventListener('mousemove', (e) => {
            cursorLight.style.left = e.clientX + 'px';
            cursorLight.style.top = e.clientY + 'px';

            if(parallaxEnabled && window.innerWidth > 768) {
                // Slower movement factor (60) combined with CSS transition makes it smooth
                const moveX = (e.clientX - window.innerWidth / 2) / 60; 
                const moveY = (e.clientY - window.innerHeight / 2) / 60;
                vantaBg.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // 3. Handle Redirect & Transitions
        const urlParams = new URLSearchParams(window.location.search);
        const redirectTarget = urlParams.get('redirect') || '/chat'; 
        
        const regLink = document.getElementById("linkToRegister");
        regLink.href = `/register?redirect=${encodeURIComponent(redirectTarget)}`;
        regLink.addEventListener('click', (e) => {
            e.preventDefault();
            parallaxEnabled = false; 
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = regLink.href;
            }, 500);
        });

        // 4. Login Logic
        const ws = new WebSocket("wss://" + window.location.hostname + "/chatws");

        ws.onmessage = (evt) => {
            const data = JSON.parse(evt.data);
            if (data.type === "login_success") {
                localStorage.setItem("chat_token", data.token);
                parallaxEnabled = false; 
                document.body.classList.add('fade-out');
                setTimeout(() => window.location.href = redirectTarget, 500);
            } else if (data.type === "error") {
                alert(data.msg);
            }
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById("usernameInput").value;
            const p = document.getElementById("passwordInput").value;
            if(ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "login", user: u, password: p }));
            } else {
                alert("Connection not ready. Please refresh.");
            }
        });
    </script>
</body>
</html>
